name: profile-app
static_sites:
  - name: profile-app
    github:
      repo: hliadchyshyn/ProfileApp
      branch: main
      deploy_on_push: true
    build_command: cd ProfileAPp && npm install && npm run build
    output_dir: ProfileAPp/dist
    index_document: index.html
    error_document: index.html
    envs:
      - key: NODE_ENV
        value: production
